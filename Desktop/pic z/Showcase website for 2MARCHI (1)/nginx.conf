# Force HTTPS
server {
    listen 80;
    server_name www.2marchi.com admin.2marchi.com;
    return 301 https://$host$request_uri;
}

# Public website
server {
    listen 443 ssl;
    server_name www.2marchi.com;

    ssl_certificate /etc/letsencrypt/live/www.2marchi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.2marchi.com/privkey.pem;

    root /var/www/2marchi/front/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/webp;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|webp|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Uploads
    location /uploads/ {
        alias /var/www/2marchi/uploads/;
        add_header Cache-Control "public, max-age=604800";
    }

    # API proxy
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Sitemap + robots (served from backend)
    location ~ ^/(sitemap\.xml|robots\.txt)$ {
        proxy_pass http://localhost:3001;
    }

    # SPA routing
    location / {
        try_files $uri /index.html;
    }
}

# Admin dashboard
server {
    listen 443 ssl;
    server_name admin.2marchi.com;

    ssl_certificate /etc/letsencrypt/live/admin.2marchi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.2marchi.com/privkey.pem;

    root /var/www/2marchi/admin/dist;
    index index.html;

    # Optional: IP allowlist (uncomment to restrict access)
    # allow YOUR.IP.ADDRESS.HERE;
    # deny all;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    gzip on;
    gzip_types text/html text/css application/javascript;

    location ~* \.(js|css|png|jpg|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
